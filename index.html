  <!-- Search logic -->
  <script>

    // Dynamically add the CSE script with selected CX
    function getSelectedCX() {
      const reels = document.getElementById('reelsCheckbox').checked;
      const pictures = document.getElementById('picturesCheckbox').checked;

      if (reels && !pictures) return 'b601844c47a6a4027'; // Only Reels
      if (!reels && pictures) return '4447b8684980f4030'; // Only Pictures
      if (reels && pictures) return '6393d36f3e7e445ea';  // If you created a combined engine

      return null;
    }

    function loadSearch(){

      const query = document.getElementById("searchBox").value.trim();
      const cx = getSelectedCX();

      if (!cx) {
        alert("Please select at least one content type.");
        return;
      }

      // Clear previous search engine instance
      document.getElementById("search-container").innerHTML = "";
      const oldScript = document.getElementById("cse-script");
      if (oldScript) oldScript.remove();

      // Insert new search results container
      const resultsDiv = document.createElement("div");
      resultsDiv.className = "gcse-searchresults-only";
      resultsDiv.setAttribute("data-queryParameterName", "q");
      document.getElementById("search-container").appendChild(resultsDiv);

      // Dynamically insert the CSE script
      const script = document.createElement("script");
      script.id = "cse-script";
      script.async = true;
      script.src = `https://cse.google.com/cse.js?cx=${cx}`;
      document.body.appendChild(script);

      // Wait for engine to initialize, then trigger the search
      setTimeout(() => {
        const input = document.querySelector("input");
        const button = document.querySelector("button");
        if (input && button) {
          input.value = query;
          button.click();
        }
      }, 1000);
    }

  </script>

<body>

  <!-- Results will appear here -->
  <div id="search-container"></div>
  
  <div class="container">
    <div class="box">

    <div class="controls">

        <label><input type="checkbox" id="picturesCheckbox" checked> Pictures</label>
