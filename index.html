  <!-- Search logic -->
  <script>
    function performSearch() {
      const reelsChecked = document.getElementById('reelsCheckbox').checked;
      const picturesChecked = document.getElementById('picturesCheckbox').checked;
      const query = document.getElementById('searchBox').value.trim();

      let siteFilters = [];

      if (reelsChecked) siteFilters.push('site:instagram.com/reel');
      if (picturesChecked) siteFilters.push('site:instagram.com/p');

      let fullQuery = '';

      if (siteFilters.length > 0) {
        fullQuery = `${siteFilters.join(' OR ')} ${query}`;
      } else {
        fullQuery = query; // fallback if nothing is checked
      }

      const searchBox = document.querySelector('input.gsc-input');
      const searchButton = document.querySelector('button.gsc-search-button');

      if (searchBox && searchButton) {
        searchBox.value = fullQuery;
        searchButton.click();
      }
    }
  </script>
